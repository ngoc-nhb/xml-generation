# Production profile — used on Render (set SPRING_PROFILES_ACTIVE=prod).
# Required env: SPRING_DATASOURCE_URL, SPRING_DATASOURCE_USERNAME, SPRING_DATASOURCE_PASSWORD, JWT_SECRET
# Optional env: XMLGEN_CORS_ALLOWED_ORIGINS (comma-separated origin patterns, e.g. https://my-app.vercel.app)
spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL}
    username: ${SPRING_DATASOURCE_USERNAME}
    password: ${SPRING_DATASOURCE_PASSWORD}
  jpa:
    show-sql: false

springdoc:
  api-docs:
    enabled: false
  swagger-ui:
    enabled: false

logging:
  level:
    root: WARN
    com.company.xmlgen: INFO
