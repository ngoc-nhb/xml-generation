spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5433/xmlgen}
    username: ${SPRING_DATASOURCE_USERNAME:xmlgen}
    password: ${SPRING_DATASOURCE_PASSWORD:xmlgen}
  jpa:
    show-sql: false

xmlgen:
  jwt:
    secret: ${JWT_SECRET:dev-only-jwt-secret-minimum-32-characters-long}

springdoc:
  api-docs:
    enabled: ${SPRINGDOC_ENABLED:true}
  swagger-ui:
    enabled: ${SPRINGDOC_ENABLED:true}
    path: /swagger-ui.html

logging:
  level:
    root: INFO
    com.company.xmlgen: DEBUG
