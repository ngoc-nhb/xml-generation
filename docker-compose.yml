# XMLGen MVP — one-command local stack (development profile)
#
# Usage:
#   docker compose up --build
#
# Postgres is NOT managed by this compose file — it uses the pre-existing
# `xmlgen-pg` container (holds real local dev data), attached to the external
# `xmlgen_default` network below so backend/frontend can reach it by name.
#
# Access:
#   Frontend:  http://localhost:8081
#   Backend:   http://localhost:8080
#   Postgres:  localhost:5433 (xmlgen-pg container)
#
# Login: admin / admin123

networks:
  default:
    name: xmlgen_default
    external: true

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      SPRING_PROFILES_ACTIVE: dev
      SPRING_DATASOURCE_URL: jdbc:postgresql://xmlgen-pg:5432/xmlgen
      SPRING_DATASOURCE_USERNAME: xmlgen
      SPRING_DATASOURCE_PASSWORD: xmlgen
      JWT_SECRET: dev-only-jwt-secret-minimum-32-characters-long
      SPRINGDOC_ENABLED: "true"
      XMLGEN_CORS_ALLOWED_ORIGINS: http://localhost:5173,http://localhost:8081

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "8081:80"
    depends_on:
      - backend
