# Production stack — backend only. Standalone file, does not merge with
# docker-compose.yml (that file is for local dev only, with its own postgres
# container). The database in production is external (e.g. Supabase) — no
# postgres service here. Frontend is deployed separately, not part of this stack.
#
# Use with:
#   docker compose -f docker-compose.prod.yml --env-file .env up --build -d
#
# Required environment variables (set in .env or shell):
#   SPRING_DATASOURCE_URL — jdbc:postgresql://<host>:5432/<db>?user=<user>&password=<password>&sslmode=require
#   JWT_SECRET             — min 32 characters

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      SPRING_PROFILES_ACTIVE: prod
      SPRING_DATASOURCE_URL: ${SPRING_DATASOURCE_URL:?SPRING_DATASOURCE_URL is required}
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required}
      SPRINGDOC_ENABLED: "false"
